<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Misconduct Decision Support — Ulster University / QAHE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f6;
  --white:#ffffff;
  --panel:#ffffff;
  --border:#dde3ed;
  --border-med:#c4cfe0;
  --border-strong:#9fb2c8;
  --navy:#0c2340;
  --navy-mid:#163558;
  --blue:#1a58a2;
  --blue-mid:#174e92;
  --blue-light:#ddeaf8;
  --blue-xlight:#f0f6fd;
  --gold:#8a6500;
  --gold-bg:#fdf5e0;
  --red:#a51d1d;
  --red-bg:#fef1f1;
  --amber:#7a4f00;
  --amber-bg:#fef5e2;
  --green:#145228;
  --green-bg:#edf7f2;
  --text:#0c1a2e;
  --text-body:#2d3f55;
  --text-mid:#3d5470;
  --text-muted:#566d88;
  --text-dim:#8099b4;
  --shadow-sm:0 1px 4px rgba(0,0,0,.09),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 14px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.05);
  --radius:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font:inherit;}

/* ── HEADER ── */
header{
  background:var(--navy);
  border-bottom:3px solid #c8a020;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
  padding:0 32px;
  display:flex;
  align-items:center;
  gap:20px;
  position:sticky;top:0;z-index:100;
  min-height:62px;
}
.hdr-logos{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.hdr-divider{width:1px;height:32px;background:rgba(255,255,255,.25);}
.logo-qahe{height:28px;width:auto;}
.logo-ulster{height:32px;width:auto;}
/* Invert Ulster SVG text for dark header */
.logo-ulster text{fill:#ffffff !important;}
.logo-ulster rect{fill:#c8a020 !important;}
.hdr-title-wrap{flex:1;padding-left:20px;border-left:1px solid rgba(255,255,255,.2);}
.hdr-title{
  font-family:'Lora',Georgia,serif;
  font-size:15px;
  color:#ffffff;
  font-weight:700;
  line-height:1.25;
  letter-spacing:-.01em;
}
.hdr-sub{
  font-size:11px;
  color:rgba(255,255,255,.6);
  margin-top:2px;
  font-weight:500;
}

/* ── PROGRESS ── */
.prog{
  background:var(--white);
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 0 var(--border);
  padding:0 32px;
  display:flex;
  overflow-x:auto;
}
.ps{
  flex:1;min-width:108px;
  padding:12px 6px;
  display:flex;align-items:center;gap:8px;
  border-bottom:2px solid transparent;
  cursor:default;
  transition:all .18s;
}
.ps.done{border-bottom-color:var(--green);cursor:pointer;}
.ps.act{border-bottom-color:var(--blue);}
.pn{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
  background:#dde3ed;color:var(--text-dim);
  transition:all .18s;
}
.ps.done .pn{background:var(--green);color:#fff;}
.ps.act .pn{background:var(--blue);color:#fff;}
.pl{font-size:12px;font-weight:600;color:var(--text-dim);white-space:nowrap;transition:all .18s;}
.ps.done .pl{color:var(--green);}
.ps.act .pl{color:var(--blue);}

/* ── LAYOUT ── */
.wrap{max-width:960px;margin:0 auto;padding:28px 32px 100px;}
.step-h{
  font-family:'Lora',Georgia,serif;
  font-size:22px;color:var(--navy);
  margin-bottom:5px;font-weight:700;
  letter-spacing:-.02em;
}
.step-d{
  color:var(--text-muted);font-size:13px;
  margin-bottom:22px;line-height:1.55;
  max-width:680px;
}

/* ── CARD ── */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 22px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.ct{
  font-size:10px;letter-spacing:1.6px;
  color:var(--text-dim);text-transform:uppercase;
  font-weight:700;margin-bottom:16px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}

/* ── FIELDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.g2{grid-template-columns:1fr;}}
.f{display:flex;flex-direction:column;}
.f label{
  font-size:11px;font-weight:700;
  letter-spacing:.3px;text-transform:uppercase;
  color:var(--text-mid);margin-bottom:6px;
}
.f input,.f select,.f textarea{
  background:#fff;
  border:1.5px solid var(--border-med);
  border-radius:7px;
  padding:9px 12px;
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
  width:100%;
}
.f input:focus,.f select:focus,.f textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(26,88,162,.12);
}
.f input::placeholder{color:var(--text-dim);}
.f select{appearance:auto;}
.f select option{background:#fff;}
.f textarea{resize:vertical;line-height:1.65;}
.hint{
  font-size:12px;color:var(--text-muted);
  line-height:1.55;margin-top:7px;
  padding:8px 11px;
  background:#f4f8fe;
  border-radius:6px;
  border-left:3px solid #93bbea;
}

/* ── TYPE CARDS ── */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:600px){.tgrid{grid-template-columns:1fr;}}
.tc{
  padding:13px 14px;border-radius:8px;
  border:1.5px solid var(--border);
  background:#fafcff;cursor:pointer;
  transition:all .15s;
  display:flex;gap:11px;align-items:flex-start;
}
.tc:hover{border-color:var(--border-med);box-shadow:var(--shadow-sm);background:#fff;}
.tc.sel{border-color:var(--blue);background:var(--blue-xlight);box-shadow:0 0 0 1px var(--blue);}
.rr{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border-med);
  flex-shrink:0;margin-top:2px;
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
}
.tc.sel .rr{border-color:var(--blue);background:var(--blue);}
.rd{width:5px;height:5px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s;}
.tc.sel .rd{opacity:1;}
.tlbl{font-weight:700;font-size:13.5px;margin-bottom:3px;color:var(--navy);}
.tdsc{font-size:11.5px;color:var(--text-muted);line-height:1.45;margin-bottom:6px;}
.ft{
  display:inline-block;padding:2px 8px;
  border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.2px;
}
.fPR{background:#d1fae5;color:#065f2c;border:1px solid #a7f3c8;}
.fNPR{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5;}

/* ── OFFENCE BTNS ── */
.obrow{display:flex;gap:8px;flex-wrap:wrap;}
.ob{
  padding:9px 18px;border-radius:7px;
  border:1.5px solid var(--border-med);
  background:#fff;color:var(--text-mid);
  font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;
  line-height:1;
}
.ob:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-xlight);}
.ob.act{border-color:var(--blue);background:var(--blue-light);color:var(--navy);font-weight:700;}

/* ── CHECKBOXES (severity / evidence) ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(max-width:560px){.sgrid{grid-template-columns:1fr;}}
.si{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border-radius:7px;
  border:1.5px solid var(--border);
  background:#fafcff;cursor:pointer;transition:all .15s;
  font-size:13px;color:var(--text-body);
  line-height:1.4;
}
.si:hover{border-color:var(--border-med);background:#fff;}
.si.ck{border-color:var(--blue);background:var(--blue-xlight);}
.cb{
  width:17px;height:17px;border-radius:4px;
  border:2px solid var(--border-med);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  transition:all .15s;color:transparent;
}
.si.ck .cb{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── LEVEL CARDS ── */
.lgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:560px){.lgrid{grid-template-columns:1fr;}}
.lc{
  padding:18px 14px;border-radius:9px;
  border:2px solid var(--border);
  background:#fff;cursor:pointer;
  transition:all .18s;text-align:center;
  box-shadow:var(--shadow-sm);
}
.lc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.lc.sl-minor{border-color:var(--green);background:var(--green-bg);}
.lc.sl-moderate{border-color:var(--amber);background:var(--amber-bg);}
.lc.sl-major{border-color:var(--red);background:var(--red-bg);}
.li{font-size:22px;margin-bottom:7px;}
.ln{font-weight:700;font-size:15px;margin-bottom:4px;letter-spacing:-.01em;}
.lh{font-size:11.5px;color:var(--text-muted);line-height:1.4;}
.minor .ln{color:var(--green);}
.moderate .ln{color:var(--amber);}
.major .ln{color:var(--red);}

/* ── RESULT BANNER ── */
.rbanner{
  border-radius:var(--radius);
  padding:20px 24px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:14px;
  border-left:5px solid transparent;
  box-shadow:var(--shadow-sm);
}
.rb-minor{background:var(--green-bg);border-left-color:var(--green);}
.rb-moderate{background:var(--amber-bg);border-left-color:var(--amber);}
.rb-major{background:var(--red-bg);border-left-color:var(--red);}
.rbl{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:5px;}
.rbs{font-family:'Lora',Georgia,serif;font-size:17px;color:var(--navy);line-height:1.35;font-weight:700;}
.pills{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pill{padding:5px 14px;border-radius:5px;font-size:12px;font-weight:700;letter-spacing:.2px;}
.p-minor{background:var(--green);color:#fff;}
.p-moderate{background:var(--amber);color:#fff;}
.p-major{background:var(--red);color:#fff;}
.p-code{
  background:var(--navy);color:#fff;
  font-family:'Courier New',monospace;
  font-size:13px;letter-spacing:1px;
  padding:5px 12px;
}

/* ── RESULT DETAIL ── */
.rc{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px 20px;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.rct{
  font-size:10px;letter-spacing:1.6px;
  text-transform:uppercase;color:var(--text-dim);
  font-weight:700;margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.chip{
  display:inline-flex;align-items:center;
  padding:4px 12px;border-radius:5px;
  font-size:12px;font-weight:700;
  margin:3px 3px 3px 0;border:1px solid transparent;
}
.ch-a{background:#dbeafe;color:#1e3a8a;border-color:#93c5fd;}
.ch-p{background:var(--gold-bg);color:var(--gold);border-color:#e8cc80;}
.ch-r{background:var(--red-bg);color:var(--red);border-color:#fca5a5;}
.ch-d{background:var(--green-bg);color:var(--green);border-color:#a7f3c8;}
.rtxt{font-size:13.5px;line-height:1.72;color:var(--text-body);}

/* ── WARN / DISC ── */
.warn{
  background:#fffbeb;
  border:1px solid #fcd34d;
  border-left:3px solid #f59e0b;
  border-radius:7px;
  padding:10px 14px;
  font-size:13px;color:#6b3c00;
  line-height:1.6;margin-bottom:10px;
}
.disc{
  background:var(--blue-xlight);
  border:1px solid #bdd5f0;
  border-radius:7px;
  padding:11px 14px;
  font-size:12.5px;color:var(--text-mid);
  line-height:1.6;margin-top:8px;
}

/* ── TABLE ROWS ── */
.srow{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.srow:last-child{border:none;}
.sk{
  color:var(--text-dim);min-width:130px;
  font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;
  padding-top:2px;flex-shrink:0;
}
.sv{color:var(--text);font-weight:600;font-size:13.5px;}

/* ── TABS ── */
.tabs{
  display:flex;
  border-bottom:2px solid var(--border);
  margin-bottom:18px;
  overflow-x:auto;
  gap:2px;
  background:var(--white);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:6px 6px 0;
  box-shadow:var(--shadow-sm);
}
.tab{
  padding:8px 15px;background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--text-muted);
  font-size:12px;font-weight:600;
  cursor:pointer;margin-bottom:-2px;
  transition:all .15s;white-space:nowrap;
  border-radius:6px 6px 0 0;
}
.tab:hover{color:var(--text-mid);background:#f0f4f8;}
.tab.act{color:var(--blue);border-bottom-color:var(--blue);background:var(--blue-xlight);}

/* ── DOC OUTPUT ── */
pre.doc{
  background:#f7f9fc;
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px 22px;
  font-family:'Courier New',Courier,monospace;
  font-size:12px;line-height:1.85;
  color:var(--text-body);
  overflow-x:auto;white-space:pre-wrap;word-break:break-word;
}

/* ── BUTTONS ── */
.btn{
  padding:9px 20px;
  border-radius:7px;
  font-size:13.5px;font-weight:600;
  cursor:pointer;border:none;
  transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;
  letter-spacing:.01em;
}
.btn-primary{
  background:var(--blue);color:#fff;
  box-shadow:0 1px 4px rgba(26,88,162,.35);
}
.btn-primary:hover{
  background:var(--blue-mid);
  box-shadow:0 3px 10px rgba(26,88,162,.4);
  transform:translateY(-1px);
}
.btn-ghost{
  background:#fff;
  border:1.5px solid var(--border-med);
  color:var(--text-mid);
}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-xlight);}
.btn-outline{background:#fff;border:1.5px solid var(--blue);color:var(--blue);}
.btn-outline:hover{background:var(--blue-light);}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* ── NAV BAR ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 18px rgba(0,0,0,.09);
  padding:12px 32px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:99;
}
.nav-info{
  font-size:12px;color:var(--text-dim);font-weight:600;
  background:var(--bg);padding:5px 14px;border-radius:20px;
  border:1px solid var(--border);
}

/* ── PRINT ── */
@media print{
  header,.prog,.nav,.tabs,.crow,.btn{display:none!important;}
  body{background:#fff;}
  pre.doc{border:1px solid #ccc;font-size:10.5px;}
}
</style>
</head>

function decide(){
  if(S.tIdx<0||!S.level) return null;
  const t=TYPES[S.tIdx];
  if(t.fam==="NPR" && S.level==="Minor" && !S.exceptionalNPR) return null;
  const p=S.prior==="3+"?3:parseInt(S.prior);
  if(t.fam==="NPR" && S.level==="Minor" && p>0) return null;
  const rule=RULES[t.fam][S.level][p]||RULES[t.fam][S.level][3];
  const total=p+1;
  const code=(REG_CODES[t.id]||"XX")+Math.min(total,4);
  return{...rule,code,total,tname:t.id,fam:t.fam,level:S.level,p,referral:!!rule.referral,exceptional:!!rule.exceptional};
}

function suggestLevel(){
  if(S.tIdx<0) return "";
  const t=TYPES[S.tIdx];
  const prior=S.prior==="3+"?3:parseInt(S.prior||"0",10);
  const h=id=>S.flags.includes(id);
  const isPR=t.fam==="PR";
  const isNPR=t.fam==="NPR";
  const small=S.extent==="under20" || h("lo_ext");
  const medium=S.extent==="20to50";
  const large=S.extent==="over50" || S.extent==="whole" || h("hi_ext");
  const poor=h("poor");
  const intent=h("intent");
  const group=h("group");
  const timed=S.setting==="exam" || h("timed");
  const acknowledged=h("admit");

  // Non-plagiarism-related offences normally start at least at Moderate.
  // Only exceptional Panel-agreed lower-concern cases (for example unintentional collusion)
  // should be treated below this, and the app does not suggest that automatically.
  if(isNPR){
    if(group || intent || prior>=2) return "Major";
    if(["Cheating","Impersonation","Contract Cheating","Fabrication / Falsification"].includes(t.id)){
      if(timed || large || prior>=1) return "Major";
      return "Moderate";
    }
    // Collusion usually starts at Moderate; larger, timed, or repeat cases push to Major.
    if(large || timed || prior>=1) return "Major";
    return "Moderate";
  }

  // Plagiarism-related offences can be Minor where the extent is limited
  // and the case looks closer to poor practice than deliberate deception.
  if(intent || group) return prior>=1 ? "Major" : "Moderate";
  if(prior>=2) return large ? "Major" : "Moderate";
  if(large) return prior>=1 ? "Major" : "Moderate";
  if(medium) return "Moderate";

  // Allow minor suggestions for small first-offence PR cases, including some AI-use cases,
  // unless other seriousness indicators clearly raise the concern.
  if(small){
    if(timed && !poor && !acknowledged && t.id==="Inappropriate AI Use") return "Moderate";
    return "Minor";
  }
  if(poor && prior===0) return "Minor";
  return prior>=1 ? "Moderate" : "Minor";
}

          <div style="width:5px;height:5px;border-radius:50%;background:#fff;opacity:${S.extent===v?1:0}"></div>

          <div style="font-size:11.5px;color:var(--text-muted)">${desc}</div>

    </div>

</div>

<div class="card">
  <div class="ct">Evidence Available</div>

  <div class="sgrid">
${EVIDENCE.map(s=>`<div class="si${S.evidence.includes(s.id)?" ck":""}" onclick="togList('evidence','${s.id}')">
  <div class="cb">${S.evidence.includes(s.id)?"✓":""}</div>
  <span>${s.text}</span>
</div>`).join("")}
  </div>

  </div>
</div>`;
}


function s4(){
  const t=S.tIdx>=0?TYPES[S.tIdx]:null;
  const sug=suggestLevel();
  const isNPR=t&&t.fam==="NPR";
  const prior=S.prior==="3+"?3:parseInt(S.prior||"0",10);
  const referralWarn=(t&&((t.fam==="PR"&&S.level==="Moderate"&&prior>=2)||(t.fam==="NPR"&&S.level==="Moderate"&&prior>=1)))
    ?`<div class="warn">Under Appendix 1, this combination results in a referral only — no School-stage penalty is imposed. The case should be referred onward for investigation as a Major level of concern.</div>`:"";
  const nprMinorWarn=isNPR&&S.level==="Minor"&&!S.exceptionalNPR;
  const nprMinorRepeatWarn=isNPR&&S.level==="Minor"&&S.exceptionalNPR&&S.prior!=="0";
  const minorDisabled=isNPR&&!S.exceptionalNPR;

  const sugBadge = sug ? `
  <div style="display:flex;align-items:center;gap:12px;margin-top:14px;padding:12px 15px;border-radius:8px;background:${sug==="Major"?"var(--red-bg)":sug==="Minor"?"var(--green-bg)":"var(--amber-bg)"};border:1.5px solid ${sug==="Major"?"var(--red)":sug==="Minor"?"var(--green)":"var(--amber)"}">
    <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${sug==="Major"?"var(--red)":sug==="Minor"?"var(--green)":"var(--amber)"}"></div>
    <div>
      <span style="font-size:12px;font-weight:600;color:var(--text-mid)">Suggested level: </span>

      <span style="font-size:12px;color:var(--text-muted)"> — based on offence family, extent, prior offences, and seriousness indicators. Confirm or override below.</span>
    </div>
  </div>` : "";

  return `<div class="step-h">Level of Concern</div>
<div class="step-d">Extent records <em>how much</em> of the work is affected. This step asks <em>why the case may be more or less serious</em> — intent, setting, prior record, and other factors that raise or lower concern.</div>

<div class="card">
  <div class="ct">Seriousness Indicators — tick any that apply</div>
  <div class="sgrid">
${SEV.map(s=>`<div class="si${S.flags.includes(s.id)?" ck":""}" onclick="tog('${s.id}')">
  <div class="cb">${S.flags.includes(s.id)?"✓":""}</div>
  <span>${s.text}</span>
</div>`).join("")}
  </div>
  <div class="hint" style="margin-top:13px">Extent and seriousness together inform the level. A small extent with poor academic practice may support Minor. A noticeable portion in a timed setting with clear intent would normally point to Moderate or Major.</div>
  ${sugBadge}
</div>

<div class="card">
  <div class="ct">Level of Concern — select one</div>
  ${isNPR?`<div class="warn" style="margin-bottom:14px">Non-plagiarism-related offences (${t.id}) normally begin at <strong>Moderate</strong> or <strong>Major</strong>. Minor is only appropriate in an exceptional Panel-agreed case — for example, clearly unintentional collusion.</div>`:""}
  <div class="lgrid">
${[{v:"Minor",i:"🟢",h:"Limited extent, poor practice, lower concern"},
   {v:"Moderate",i:"🟡",h:"Significant breach, likely School penalty range"},
   {v:"Major",i:"🔴",h:"Serious concern, referral or Faculty stage"}].map(({v,i,h})=>{
     const dis=(v==="Minor"&&minorDisabled);
     return `<div class="lc ${v.toLowerCase()}${S.level===v?" sl-"+v.toLowerCase():""}" style="${dis?"opacity:.4;cursor:not-allowed;":""}" onclick="${dis?"void(0)":"S.level='"+v+"';render()"}">
  <div class="li">${i}</div><div class="ln">${v}</div><div class="lh">${h}</div>
</div>`;
   }).join("")}
  </div>
  ${isNPR?`<label style="display:flex;gap:10px;align-items:flex-start;margin-top:14px;padding:11px 14px;background:#f8fafc;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:13.5px;color:var(--text-body)">
    <input type="checkbox" style="margin-top:2px;flex-shrink:0" ${S.exceptionalNPR?"checked":""} onchange="S.exceptionalNPR=this.checked;if(!this.checked&&S.level==='Minor')S.level='';render()">

  </label>`:""}
  ${nprMinorWarn?`<div class="warn" style="margin-top:10px">To select Minor for a non-plagiarism-related case, tick the exceptional-case checkbox above first.</div>`:""}
  ${nprMinorRepeatWarn?`<div class="warn" style="margin-top:10px">NPR Minor is not a standard repeat pathway under Appendix 1. With a prior offence recorded, this case should normally be reconsidered under the NPR Moderate or Major route.</div>`:""}

// ════════════════ HELPERS ════════════════
function tog(id){S.flags=S.flags.includes(id)?S.flags.filter(x=>x!==id):[...S.flags,id];render();}
function togList(key,id){S[key]=S[key].includes(id)?S[key].filter(x=>x!==id):[...S[key],id];render();}
function doCopy(w){
  const txt=w==="form"?genForm():w==="summary"?genCaseSummary():genEmail();
  const fn=()=>{S.copied=w;render();setTimeout(()=>{S.copied="";render();},2200);};
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(fn);}
  else{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);fn();}
}
function copyTxt(txt,w){
  const fn=()=>{S.copied=w;render();setTimeout(()=>{S.copied="";render();},2200);};
  if(navigator.clipboard){navigator.clipboard.writeText(txt||"").then(fn);}
  else{const ta=document.createElement("textarea");ta.value=txt||"";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);fn();}
}


function normalizeText(v){
  return String(v||"").trim().toLowerCase().replace(/[^a-z0-9]+/g," ");
}
function priorCountNum(){
  return S.prior==="3+" ? 3 : parseInt(S.prior||"0",10);
}
function priorLabelFromState(){
  const p = priorCountNum();
  if(p===0) return "First";
  if(p===1) return "Second";
  return "Third or subsequent";
}
function humanSetting(v){
  if(v==="exam") return "Timed / controlled setting";
  if(v==="presentation") return "Presentation / viva / live demonstration";
  return "Coursework / take-home setting";
}
function currentTypeObj(){
  return S.tIdx>=0 ? TYPES[S.tIdx] : null;
}
function buildCaseRecord(){
  const t = currentTypeObj();
  const d = decide();
  return {
    student_name: S.sName || "",
    student_number: S.sNum || "",
    programme: S.prog || "",
    year_of_study: S.yr || "",
    level: S.ugpg || "",
    offence_count_label: priorLabelFromState(),
    prior_offences: priorCountNum(),
    module_code: S.mCode || "",
    module_title: S.mName || "",
    qahe_module_leader: S.coord || "",
    uu_module_leader: "",
    assessment_item: S.assessItem || "",
    assessment_type: S.assessType || "",
    assessment_setting: humanSetting(S.setting),
    date_submitted: S.dSub || "",
    date_detected: "",
    date_student_meeting: "",
    student_meeting_mode: "Microsoft Teams",
    misconduct_type: t ? t.id : "",
    offence_family: t ? t.fam : "",
    level_of_concern: S.level || "",
    exceptional_npr_minor: !!S.exceptionalNPR,
    panel_type: d ? (d.panel==="Faculty" ? "Higher-level internal QAHE review / Faculty-stage equivalent" : "Local QAHE School-stage panel") : "",
    panel_members: [],
    evidence_items: (S.evidence||[]).map(id => {
      const item = EVIDENCE.find(x => x.id===id);
      return item ? item.text : id;
    }),
    extent_affected: (() => {
      if(S.extent==="under20") return "Up to about 20%";
      if(S.extent==="20to50") return "About 20% to 50%";
      if(S.extent==="over50") return "About 50% or more";
      if(S.extent==="whole") return "Whole or almost whole assessment";
      return "";
    })(),
    summary_of_concern: S.ctx || "",
    narrative_and_rationale: S.levelNote || "",
    recommended_actions: d ? (d.actions || []) : [],
    recommended_penalties: d ? (d.pen || []) : [],
    referral_only: d ? !!d.referral : false,
    register_code: d ? (d.code || "") : "",
    form_completed_by: S.coord || "",
    form_completed_role: "Module Leader",
    date_completed: new Date().toISOString().slice(0,10),
    date_recorded_on_register: "",
    recorded_by: "",
    student_contact_email_subject: (S.mName||S.mCode) ? `Meeting Invitation — Academic Integrity Concern for ${S.mName||"[Module]"} (${S.mCode||""})`.trim() : "Meeting Invitation — Academic Integrity Concern",
    student_contact_email_body: genInitialContactEmail(),
    outcome_email_subject: "Outcome of academic misconduct case",
    outcome_email_body: genEmail()
  };
}
function saveCaseJson(){
  const rec = buildCaseRecord();
  const safeStudent = (rec.student_number || rec.student_name || "case").toString().trim().replace(/[^a-z0-9]+/gi,"-").replace(/^-|-$/g,"").toLowerCase();
  const safeModule = (rec.module_code || "module").toString().trim().replace(/[^a-z0-9]+/gi,"-").replace(/^-|-$/g,"").toLowerCase();
  const fname = `misconduct-case-${safeStudent || "case"}-${safeModule || "module"}.json`;
  const blob = new Blob([JSON.stringify(rec, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
function loadCaseJsonClick(){
  const inp = document.getElementById("jsonLoader");
  if(inp){ inp.value = ""; inp.click(); }
}
function typeIndexFromName(name){
  const n = normalizeText(name);
  for(let i=0;i<TYPES.length;i++){
    if(normalizeText(TYPES[i].id)===n) return i;
  }
  if(n.includes("inappropriate use of ai") || n.includes("inappropriate ai use")) return TYPES.findIndex(t => t.id==="Inappropriate AI Use");
  if(n.includes("self plagiarism")) return TYPES.findIndex(t => t.id==="Self-Plagiarism");
  return -1;
}
function extentToState(v){
  const n = normalizeText(v);
  if(n.includes("20") && n.includes("50")) return "20to50";
  if(n.includes("whole") || n.includes("almost whole")) return "whole";
  if(n.includes("50") || n.includes("large")) return "over50";
  if(n.includes("20") || n.includes("small") || n.includes("partial") || n.includes("limited")) return "under20";
  return "";
}
function settingToState(v){
  const n = normalizeText(v);
  if(n.includes("timed") || n.includes("controlled") || n.includes("exam") || n.includes("class test")) return "exam";
  if(n.includes("presentation") || n.includes("viva") || n.includes("live")) return "presentation";
  return "coursework";
}
function evidenceIdsFromNames(items){
  const out = [];
  (items || []).forEach(name => {
    const n = normalizeText(name);
    const hit = EVIDENCE.find(e => normalizeText(e.text)===n || normalizeText(e.id)===n || normalizeText(e.text).includes(n) || n.includes(normalizeText(e.text)));
    if(hit && !out.includes(hit.id)) out.push(hit.id);
  });
  return out;
}
function applyCaseRecord(data){
  const idx = typeIndexFromName(data.misconduct_type || "");
  const rawPrior = typeof data.prior_offences === "number" ? data.prior_offences : parseInt(String(data.prior_offences || "0"), 10);
  const prior = isNaN(rawPrior) ? "0" : (rawPrior >= 3 ? "3+" : String(rawPrior));
  Object.assign(S, {
    step: 0,
    sName: data.student_name || "",
    sNum: data.student_number || "",
    prog: data.programme || "",
    yr: data.year_of_study || "",
    ugpg: (data.level || "UG").toUpperCase()==="PG" ? "PG" : "UG",
    mName: data.module_title || "",
    mCode: data.module_code || "",
    coord: data.qahe_module_leader || data.form_completed_by || "",
    dSub: dateVal(data.date_submitted || ""),
    tIdx: idx,
    prior: prior,
    assessItem: data.assessment_item || "",
    assessType: data.assessment_type || "",
    setting: settingToState(data.assessment_setting || ""),
    extent: extentToState(data.extent_affected || ""),
    evidence: evidenceIdsFromNames(data.evidence_items || []),
    level: data.level_of_concern || "",
    levelNote: data.narrative_and_rationale || "",
    flags: [],
    ctx: data.summary_of_concern || "",
    exceptionalNPR: !!data.exceptional_npr_minor,
    tab: "contact",
    copied: ""
  });
  if(S.level || S.ctx || S.assessType) S.step = 5;
  render();
}
function importCaseJson(event){
  const file = event && event.target && event.target.files ? event.target.files[0] : null;
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(String(e.target.result || "{}"));
      applyCaseRecord(data);
      alert("Case JSON loaded successfully.");
    }catch(err){
      alert("Could not read the JSON file. Please check the file and try again.");
    }
  };
  reader.readAsText(file);
}

function exportPdf(){
  window.print();
}
function newCase(){
  Object.assign(S,{step:0,sName:"",sNum:"",prog:"",yr:"",ugpg:"UG",mName:"",mCode:"",coord:"",dSub:"",tIdx:-1,prior:"0",assessItem:"",assessType:"",setting:"coursework",extent:"",evidence:[],level:"",levelNote:"",flags:[],ctx:"",exceptionalNPR:false,tab:"contact",copied:""});
  render();
}

function canGo(){
  if(S.step===0) return true;
  if(S.step===1) return true;
  if(S.step===2) return S.tIdx>=0;
  if(S.step===3) return !!S.assessType && !!S.setting && !!S.extent;
  if(S.step===4){ if(!S.level) return false; const t=S.tIdx>=0?TYPES[S.tIdx]:null; if(t&&t.fam==="NPR"&&S.level==="Minor"&&!S.exceptionalNPR) return false; if(t&&t.fam==="NPR"&&S.level==="Minor"&&S.prior!=="0") return false; if(t&&t.fam==="NPR"&&S.level==="Minor") return !!(S.levelNote||"").trim(); return true; }
  return true;
}
function goNext(){if(canGo()&&S.step<5){S.step++;render();window.scrollTo(0,0);}}
function goBack(){if(S.step>0){S.step--;render();window.scrollTo(0,0);}}
function updateNav(){const bn=document.getElementById("bNext");if(bn)bn.disabled=!canGo();}

// ════════════════ RENDER ════════════════

function render(){
  document.getElementById("prog").innerHTML=STEPS.map((s,i)=>`
<div class="ps${i<S.step?" done":i===S.step?" act":""}" ${i<S.step?`onclick="S.step=${i};render()" style="cursor:pointer"`:""}>
  <div class="pn">${i<S.step?"✓":i+1}</div><div class="pl">${s}</div>
</div>`).join("");

  let html="";
  if(S.step===5 && S.tab==="guidance") S.tab="contact";
  if(S.step===0)html=s0();
  else if(S.step===1)html=s1();
  else if(S.step===2)html=s2();
  else if(S.step===3)html=s3();
  else if(S.step===4)html=s4();
  else html=s5();
  document.getElementById("app").innerHTML=html;

  const bb=document.getElementById("bBack");
  const bn=document.getElementById("bNext");
  bb.disabled=S.step===0;
  bn.disabled=!canGo();
  if(S.step===5){bn.textContent="+ New Case";bn.onclick=newCase;}
  else{bn.textContent=S.step===4?"Review Decision →":"Continue →";bn.onclick=goNext;}
  document.getElementById("navInfo").textContent=`Step ${S.step+1} of ${STEPS.length}`;
  const ds = document.getElementById("dateSubmitted");
  if(ds) ds.value = dateVal(S.dSub);
}

render();
</script>
